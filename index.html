<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>
        Homework Helper
    </title>
    <link rel="stylesheet" href="Assignment4.css.css" id="image">
</head>
    <body>
        <div id="login">
            <button class="Login">Login</button><button class="Register">Register</button>
        </div>
        <div id="login_div">
            <h3>
                Email
            </h3>
            <input type="test" id="login_email">
            <h3>
                Password
            </h3>
            <input type="password" id="login_password"><br>
            <button id="submit_login">Login</button>
            <br><p id="login_error_text"></p>
        </div>
        <div id="register_div">
            <h3>
                First Name
            </h3>
            <input type="test" id="register_first_name">
            <h3>
                Last Name
            </h3>
            <input type="test" id="register_last_name">
            <h3>
                Email
            </h3>
            <input type="test" id="register_email">
            <h3>
                Password
            </h3>
            <input type="test" id="register_password"><br>
            <button id="register_login">Register</button>
            <br><p id="error_text"></p>
        </div>
        <div id="top">
            <h1 id="my-heading">
                Next Assignment
            </h1>
            <h3 id="name_assignments">
                Name
            </h3>
            <input type="test" id="Assignments">
            <h3 id="description_header">
                Description of Assignment
            </h3>
            <input type="test" id="description">
            <h3 id="due_date_header">
                Due Date
            </h3>
            <input type="test" id="due_date">
            <h3 id="course_header">
                Course
            </h3>
            <input type="test" id="course">
            <h3 id="professor_header">
                Professor
            </h3>
            <input type="test" id="professor">
            <button id="add_assignment_button">Add Assignment!</button>
            <button id="pick_random_assignment">Pick Your Next Assignment!</button>
            <span id="assignment_name"></span>
            </div>


            <div id="results"></div>
            <ol id="assignment_list">
            </ol>
            <div id="randomassignmentlist"></div>
            <script src="Assignment4.js"></script>
        </div>
    </body>
</html>
